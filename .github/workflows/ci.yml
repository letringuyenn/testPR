name: CI Pipeline - Wrong Directory
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install Dependencies
        # CỐ TÌNH LỖI: Lệnh này chạy ở thư mục gốc, nhưng package.json nằm ở ./frontend
        run: npm install
